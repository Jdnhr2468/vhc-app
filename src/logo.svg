<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <defs>
    <linearGradient id="logoG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
  </defs>

  <rect width="60" height="60" rx="16" fill="url(#logoG)" />

  <!-- Central atom -->
  <circle cx="30" cy="30" r="5" fill="white" />

  <!-- Side atoms -->
  <circle cx="14" cy="20" r="3.5" fill="white" opacity="0.9" />
  <circle cx="46" cy="20" r="3.5" fill="white" opacity="0.9" />
  <circle cx="14" cy="40" r="3.5" fill="white" opacity="0.9" />
  <circle cx="46" cy="40" r="3.5" fill="white" opacity="0.9" />

  <!-- Top and bottom atoms -->
  <circle cx="30" cy="12" r="2.5" fill="white" opacity="0.7" />
  <circle cx="30" cy="48" r="2.5" fill="white" opacity="0.7" />

  <!-- Main bonds -->
  <line x1="30" y1="30" x2="14" y2="20" stroke="white" stroke-width="1.5" opacity="0.7" />
  <line x1="30" y1="30" x2="46" y2="20" stroke="white" stroke-width="1.5" opacity="0.7" />
  <line x1="30" y1="30" x2="14" y2="40" stroke="white" stroke-width="1.5" opacity="0.7" />
  <line x1="30" y1="30" x2="46" y2="40" stroke="white" stroke-width="1.5" opacity="0.7" />
  <line x1="30" y1="30" x2="30" y2="12" stroke="white" stroke-width="1.5" opacity="0.7" />
  <line x1="30" y1="30" x2="30" y2="48" stroke="white" stroke-width="1.5" opacity="0.7" />

  <!-- Extra bonds -->
  <line x1="14" y1="20" x2="30" y2="12" stroke="white" stroke-width="1" opacity="0.4" />
  <line x1="46" y1="20" x2="30" y2="12" stroke="white" stroke-width="1" opacity="0.4" />
  <line x1="14" y1="40" x2="30" y2="48" stroke="white" stroke-width="1" opacity="0.4" />
  <line x1="46" y1="40" x2="30" y2="48" stroke="white" stroke-width="1" opacity="0.4" />
  <line x1="14" y1="20" x2="14" y2="40" stroke="white" stroke-width="1" opacity="0.4" />
  <line x1="46" y1="20" x2="46" y2="40" stroke="white" stroke-width="1" opacity="0.4" />

  <!-- Pulse line -->
  <polyline
    points="8,52 13,52 16,46 19,56 22,48 25,52 32,52"
    stroke="white" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none" opacity="0.85"
  />
</svg>
